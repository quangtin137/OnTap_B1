<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnTap B1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <main class="container">
      <header class="hero card">
        <p class="eyebrow">B1 CEFR PRACTICE</p>
        <h1>OnTap B1 Exam Generator</h1>
        <p class="subtitle">
          Công cụ ôn tập B1 CEFR theo dữ liệu A-K đã parse. Hãy chọn chế độ học để bắt đầu.
        </p>
        
        <div id="modeSelectionScreen">
          <h3 class="screen-title">Select Learning Mode:</h3>
          <div class="actions">
            <button class="btn btn-primary btn-mode" data-mode="free_candidate">Free Candidate</button>
            <button class="btn btn-primary btn-mode" data-mode="two_week">2-Week Learner</button>
            <button class="btn btn-primary btn-mode" data-mode="four_week">4-Week Learner</button>
          </div>
        </div>

        <div id="practiceMockScreen" class="hidden">
          <h3 class="screen-title">Mode Selected: <span id="selectedModeLabel" class="mode-label"></span></h3>
          
          <div id="customizeScopeScreen" class="card" style="margin-top: 20px; margin-bottom: 20px; padding: 15px; border-radius: 8px; border: 1px solid #ddd; box-shadow: none;">
            <h4 style="margin-top: 0; color: var(--accent);">Customize Scope</h4>
            <div id="scopeTableContainer" style="overflow-x: auto;"></div>
            <div style="margin-top: 15px; display: flex; gap: 10px;">
              <button id="btnApplyScope" class="btn btn-outline" style="border-color: var(--ok); color: var(--ok);">Apply Scope</button>
              <button id="btnResetScope" class="btn btn-outline" style="border-color: #888; color: #888;">Reset to Mode Default</button>
            </div>
            <p id="scopeStatusMsg" style="margin-top: 10px; font-size: 0.9rem; font-weight: bold;"></p>
          </div>

          <div class="actions" id="practiceMockActions">
            <button id="btnPractice" class="btn btn-primary">Practice Mode</button>
            <button id="btnMockExam" class="btn btn-primary">Mock Exam</button>
          </div>
          <p id="inlineMessage" class="status hidden inline-message"></p>
          <div id="practiceSectionScreen" class="hidden">
            <h3 class="screen-title" style="margin-top: 10px;">Select Section to Practice:</h3>
            <div class="actions" id="practiceSectionList" style="flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px;">
              <!-- Dynamically populated -->
            </div>
          </div>
        </div>
        <p id="datasetStatus" class="status"></p>
      </header>

      <section id="examSummary" class="card summary hidden"></section>
      <section id="examRoot" class="card hidden"></section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
