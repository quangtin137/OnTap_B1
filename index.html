<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnTap B1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <main class="container">
      <header class="hero card">
        <p class="eyebrow">B1 CEFR PRACTICE</p>
        <h1>OnTap B1 Exam Generator</h1>
        <p class="subtitle">
          Sinh đề ôn tập theo đúng blueprint A-H (Reading, Writing, Listening), chấm điểm tự động và review câu sai.
        </p>
        <div class="actions">
          <button id="btnGenerate" class="btn btn-primary">Sinh đề mới</button>
          <button id="btnSubmit" class="btn btn-dark" disabled>Nộp bài</button>
        </div>
        <p id="datasetStatus" class="status"></p>
      </header>

      <section id="examSummary" class="card summary hidden"></section>
      <section id="examRoot" class="card"></section>
      <section id="resultRoot" class="card hidden"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
